<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="collecta">
  <meta name="google-signin-client_id" content="1:520182917938:web:f54504e433d782bf1f452b.apps.googleusercontent.com">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- <title>collecta</title>
  <link rel="manifest" href="manifest.json">
</head> -->
<title>collecta</title>
  <link rel="manifest" href="manifest.json">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
  <script type="text/javascript">
     window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.worker.min.js';
  </script>
</head>


<body>
  <!-- Redirect overlay for native app opening (hidden by default) -->
  <div id="app-redirect" style="display:none; position:fixed; inset:0; background:#fff;
    font-family:sans-serif; direction:rtl; text-align:center;
    flex-direction:column; align-items:center; justify-content:center; z-index:9999;">
    <img src="icons/Icon-192.png" style="width:80px;border-radius:18px;margin-bottom:20px;" />
    <h2 style="margin:0 0 8px; font-size:22px; color:#1a1a1a;">Collecta</h2>
    <p style="color:#555; margin:0 0 28px; font-size:15px;">פתח באפליקציה לחוויה מלאה</p>
    <a id="open-app-btn" href="#"
      style="background:#1a73e8; color:#fff; padding:14px 36px; border-radius:25px;
        text-decoration:none; font-size:16px; font-weight:600; margin-bottom:16px;">
      פתח באפליקציה
    </a>
    <br/>
    <button onclick="continueInBrowser()"
      style="background:none; border:none; color:#888; font-size:14px;
        cursor:pointer; margin-top:8px; text-decoration:underline;">
      המשך בדפדפן
    </button>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var orgId = params.get('orgId');
      var isOnMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

      if (!orgId || !isOnMobile) return; // desktop or no orgId — load Flutter normally

      var deepLink = 'collecta://start?orgId=' + encodeURIComponent(orgId);
      var redirectEl = document.getElementById('app-redirect');
      var openBtn = document.getElementById('open-app-btn');

      openBtn.href = deepLink;
      redirectEl.style.display = 'flex';

      // Auto-attempt open (works on Android and some in-app browsers)
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = deepLink;
      document.body.appendChild(iframe);

      // Also try direct navigation after short delay (helps Android)
      var timer = setTimeout(function() {
        window.location.href = deepLink;
      }, 300);

      // If after 1.8s the page is still visible, the app didn't open
      // Show the overlay with the "Open in App" button (already visible)
      // so the user can tap it manually (required on iOS with in-app browsers)
      setTimeout(function() {
        clearTimeout(timer);
      }, 1800);
    })();

    function continueInBrowser() {
      document.getElementById('app-redirect').style.display = 'none';
      loadFlutter();
    }

    function loadFlutter() {
      var s = document.createElement('script');
      s.src = 'flutter_bootstrap.js';
      document.body.appendChild(s);
    }
  </script>

  <!-- Load Flutter only if NOT mobile with orgId (handled above), otherwise loaded by loadFlutter() -->
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var orgId = params.get('orgId');
      var isOnMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      if (!orgId || !isOnMobile) {
        // Desktop or no orgId — load Flutter directly
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        document.body.appendChild(s);
      }
    })();
  </script>
</body>
</html>
